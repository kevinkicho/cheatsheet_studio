name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit & component tests
        run: npm test

      - name: Agent SDK tests + doctor
        run: |
          npm run test:sdk
          npm run cheatsheet -- doctor

      - name: Flagship packs smoke (agent → sheet JSON)
        run: |
          npm run agent:flagship:validate
          npm run cheatsheet -- pack calc-final -o examples/agent-out/calc-final.sheet.json
          npm run cheatsheet -- validate examples/agent-out/calc-final.sheet.json
          npm run cheatsheet -- pack stats-midterm -o examples/agent-out/stats-midterm.sheet.json
          npm run cheatsheet -- validate examples/agent-out/stats-midterm.sheet.json
          npm run cheatsheet -- pack micro-midterm -o examples/agent-out/micro-midterm.sheet.json
          npm run cheatsheet -- validate examples/agent-out/micro-midterm.sheet.json

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (landing + auth gate)
        run: npm run test:e2e

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: E2E with Auth emulator (signed-in workspace)
        run: npm run test:e2e:emulators

      - name: Typecheck & production build
        run: npm run build

      - name: Verify dist assets
        run: |
          test -f dist/index.html
          grep -E 'assets/index-.*\.js' dist/index.html
