# CI is intentionally DISABLED for automatic runs.
# Pushes and PRs will not trigger GitHub Actions.
#
# To re-enable later: restore `push` / `pull_request` under `on:`.
# Manual run (optional): Actions → CI → Run workflow
name: CI

on:
  # No push / pull_request — never auto-run.
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: CI disabled
        run: |
          echo "Automatic CI is turned off for this repo."
          echo "Enable push/pull_request triggers in .github/workflows/ci.yml when you want it back."
